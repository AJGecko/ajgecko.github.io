<style>

        box-sizing: border-box;
    }

    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
    }

    body {
        color: #e0e0e0;
        font-family: Arial, sans-serif;
        text-align: justify;
        hyphens: auto;

        background-color: #0b0f19;
        background-image: 
            radial-gradient(circle at 200px 200px, rgba(0, 170, 0, 0.6) 0%, transparent 300px),
            radial-gradient(circle at 1000px 200px, rgba(0, 170, 0, 0.6) 0%, transparent 300px),
